version: '3.8'
services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"  # Dodano za bolje debugiranje
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default

  engine:
    build: .
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.engine.rule=PathPrefix(`/`)"
      - "traefik.http.services.engine.loadbalancer.server.port=80"
      - "traefik.http.routers.engine.entrypoints=web"
      # Dodajemo middleware za stripanje prefiksa ako je potrebno
      - "traefik.http.middlewares.strip-prefix.stripprefix.prefixes=/"
      - "traefik.http.routers.engine.middlewares=strip-prefix@docker"
    networks:
      - default
    env_file:
      - .env
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example

  redis:
    image: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:

networks:
  default:
